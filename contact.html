<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>André Luiz | Contact</title>
    <link rel="stylesheet" href="stylecontact.css">
</head>
<body>
    <section class="contact-section" id = "contact"></section>
    <div class="contact-section">
      <div class="inner-width">
        <h1>Get in touch</h1>
        <input type="text" class="nameform" placeholder="Your name" required>
        <input type="email" class="email" placeholder="Your email" required>
        <textarea class = "mes" name="message" placeholder="Message" rows="1" required></textarea>
        <button>Get in touch</button>
      </div>
</body>
</html>
