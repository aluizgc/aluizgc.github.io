<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>André Luiz | Contact </title>
    <link rel="stylesheet" href="css/stylecontact.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="contact-section">
        <h1>Get in touch</h1>
        <div class="border"></div>
        <form action="index.html" class="contact-form" method="POST" action="https://formspree.io/aluizgc@gmail.com">
            <input type="text" class="contact-form-text" placeholder="Your name" required>
            <input type="email" class="contact-form-text" placeholder="Your email" required>
            <textarea class="contact-form-text" cols="30" rows="10" placeholder="Your message" required></textarea>
            <input type="submit" class="contact-form-btn" value="Send">
        </form>
    </div>
</body>
</html>
